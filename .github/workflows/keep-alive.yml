name: keep-alive

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 (GitHub Actions 최소 5분, 너무 짧으면 cron drift 가능)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping signal-desk-api /health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              https://signal-desk-api-production.up.railway.app/health)
            echo "attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "ping failed after 3 attempts"
          exit 1
