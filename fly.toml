app = "signal-desk-api"
primary_region = "nrt"

[build]

[env]
  SERVER_PORT = "8080"
  SIGNAL_DESK_STORE_MODE = "jdbc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
