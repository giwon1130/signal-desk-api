server:
  port: ${PORT:${SERVER_PORT:8091}}

spring:
  application:
    name: signal-desk-api

signal-desk:
  store:
    mode: ${SIGNAL_DESK_STORE_MODE:file}
    path: ./data/signal-desk-store.json
    jdbc:
      url: ${SIGNAL_DESK_STORE_JDBC_URL:}
      username: ${SIGNAL_DESK_STORE_JDBC_USERNAME:}
      password: ${SIGNAL_DESK_STORE_JDBC_PASSWORD:}
      driver-class-name: org.postgresql.Driver
  integrations:
    krx:
      enabled: true
      base-url: https://data.krx.co.kr
    naver:
      enabled: true
      base-url: https://polling.finance.naver.com
    cboe:
      enabled: true
      vix-url: https://cdn.cboe.com/api/global/delayed_quotes/options/_VIX.json
    fred:
      enabled: true
      base-url: https://fred.stlouisfed.org/graph/fredgraph.csv
    google-news:
      enabled: true
      base-url: https://news.google.com/rss/search
    venue-signals:
      enabled: false
