server:
  # Railway injects PORT; fall back to SERVER_PORT then 8091
  port: ${PORT:${SERVER_PORT:8091}}
  tomcat:
    threads:
      max: 50            # default 200 → 본인 트래픽엔 과함, 메모리 절감
      min-spare: 5
    accept-count: 50

spring:
  application:
    name: signal-desk-api
  flyway:
    enabled: false  # Flyway는 SignalDeskJdbcConfig에서 직접 실행 (jdbc 모드일 때만)
  datasource:
    hikari:
      maximum-pool-size: 5      # default 10 → 본인 트래픽엔 5로 충분
      minimum-idle: 1
      connection-timeout: 5000
      idle-timeout: 300000

logging:
  level:
    # quote fetch 로그가 분당 10+회 INFO로 찍혀서 사용량/가독성 모두 안 좋음
    com.giwon.signaldesk.features.market.application.NaverFinanceQuoteClient: WARN
    com.giwon.signaldesk.features.realtime.PriceTickerHandler: WARN

signal-desk:
  store:
    mode: ${SIGNAL_DESK_STORE_MODE:}
    path: ./data/signal-desk-store.json
    jdbc:
      # Railway PostgreSQL may provide DATABASE_URL(postgres://...) or JDBC_DATABASE_URL.
      # Fall back to PG* env vars so attached DB works without extra mapping.
      url: ${JDBC_DATABASE_URL:${DATABASE_URL:${SIGNAL_DESK_STORE_JDBC_URL:}}}
      username: ${PGUSER:${SIGNAL_DESK_STORE_JDBC_USERNAME:}}
      password: ${PGPASSWORD:${SIGNAL_DESK_STORE_JDBC_PASSWORD:}}
      host: ${PGHOST:}
      port: ${PGPORT:5432}
      database: ${PGDATABASE:}
      driver-class-name: org.postgresql.Driver
  integrations:
    krx:
      enabled: true
      base-url: https://data.krx.co.kr
    naver:
      enabled: true
      base-url: https://polling.finance.naver.com
    cboe:
      enabled: true
      vix-url: https://cdn.cboe.com/api/global/delayed_quotes/options/_VIX.json
    fred:
      enabled: true
      base-url: https://fred.stlouisfed.org/graph/fredgraph.csv
      # FRED Web API (CPI, FedFundsRate 등 시계열). 비어있으면 매크로 카드 비활성.
      api-base-url: ${FRED_API_BASE_URL:https://api.stlouisfed.org/fred}
      api-key: ${FRED_API_KEY:}
    dart:
      # OpenDART (https://opendart.fss.or.kr) — 한국 상장사 공시. 비어있으면 disclosure scan noop.
      enabled: true
      base-url: ${DART_BASE_URL:https://opendart.fss.or.kr}
      api-key: ${DART_API_KEY:}
    google-news:
      enabled: true
      base-url: https://news.google.com/rss/search
    venue-signals:
      enabled: false
    gemini:
      # Google AI Studio 에서 발급. 비어있으면 미디어 요약 기능 비활성.
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      model: ${GEMINI_MODEL:gemini-2.0-flash-exp}
    finnhub:
      # finnhub.io 무료 가입 후 발급. 비어있으면 earnings 캘린더 비활성.
      enabled: true
      base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
      api-key: ${FINNHUB_API_KEY:}
    sec-edgar:
      # SEC EDGAR 공시 폴링. user-agent 에 연락처 포함 필수 (SEC fair-access).
      enabled: true
      tickers-url: ${SEC_EDGAR_TICKERS_URL:https://www.sec.gov/files/company_tickers.json}
      recent-url: ${SEC_EDGAR_RECENT_URL:https://www.sec.gov/cgi-bin/browse-edgar}
      user-agent: ${SEC_EDGAR_USER_AGENT:signal-desk-personal gwim113000@gmail.com}
    yahoo-screener:
      enabled: true
      base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com}
    naver-global:
      enabled: true
      base-url: ${NAVER_GLOBAL_BASE_URL:https://api.stock.naver.com}
  auth:
    google:
      # idToken aud 화이트리스트 (콤마). iOS + web 신/구 클라이언트 모두 허용.
      # env(SIGNAL_DESK_AUTH_GOOGLE_ALLOWED_AUDIENCES) 로 오버라이드 가능.
      allowed-audiences: ${SIGNAL_DESK_AUTH_GOOGLE_ALLOWED_AUDIENCES:496073748220-n9end3a963hj96nh6ru6ai3d54u8g72v.apps.googleusercontent.com,496073748220-oavb78f6holdrlhlvqa6b1fcljih1g4u.apps.googleusercontent.com,496073748220-lvagt9ir98pc3qc2lfqtglqbjem4ed2c.apps.googleusercontent.com}
  reading:
    # 리딩 리더 자동승인 + 승인 권한을 가진 운영자 이메일 (콤마 구분). 기본 운영자 1명 고정.
    admin-emails: ${SIGNAL_DESK_READING_ADMIN_EMAILS:gwim113000@gmail.com}
  cors:
    allowed-origin-patterns: ${SIGNAL_DESK_CORS_ALLOWED_ORIGINS:}
